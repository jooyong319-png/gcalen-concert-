<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>오프라인 · 게임 출시 캘린더</title>
  <style>
    :root { color-scheme: light dark; }
    * { box-sizing: border-box; margin: 0; }
    body {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 0.6rem;
      padding: 2rem 1.5rem calc(2rem + env(safe-area-inset-bottom));
      font-family: 'Pretendard Variable', -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Noto Sans KR', sans-serif;
      text-align: center;
      background: #f6f7f9;
      color: #1a1d24;
    }
    @media (prefers-color-scheme: dark) {
      body { background: #0f1115; color: #e6e6e6; }
      .hint { color: #888; }
      .retry { background: #34d399; color: #06281e; }
    }
    .icon {
      width: 64px; height: 64px;
      display: grid; place-items: center;
      border-radius: 18px;
      background: linear-gradient(135deg, #047857, #10b981);
      color: #fff;
      margin-bottom: 0.6rem;
    }
    h1 { font-size: 1.25rem; font-weight: 800; letter-spacing: -0.02em; }
    .hint { color: #6b7280; font-size: 0.92rem; line-height: 1.5; max-width: 22rem; }
    .retry {
      margin-top: 1rem;
      border: none;
      background: #047857;
      color: #fff;
      font-weight: 700;
      font-size: 0.95rem;
      padding: 0.7rem 1.5rem;
      border-radius: 999px;
      cursor: pointer;
    }
  </style>
</head>
<body>
  <div class="icon" aria-hidden="true">
    <svg width="34" height="34" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
      <path d="M6 11h4M8 9v4M15 12h.01M18 10h.01M17.32 5H6.68a4 4 0 0 0-3.978 3.59C2.6 9.4 2 14.46 2 16a3 3 0 0 0 5 2l1.41-1.41A2 2 0 0 1 9.83 16h4.34a2 2 0 0 1 1.42.59L17 18a3 3 0 0 0 5-2c0-1.54-.6-6.6-.7-7.41A4 4 0 0 0 17.32 5z" />
    </svg>
  </div>
  <h1>오프라인 상태예요</h1>
  <p class="hint">인터넷 연결이 끊겼어요. 연결을 확인한 뒤 다시 시도해 주세요. 게임 출시 일정은 온라인일 때 최신으로 보여드려요.</p>
  <button class="retry" onclick="location.reload()">다시 시도</button>
</body>
</html>
